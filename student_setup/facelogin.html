<!DOCTYPE html>
<html>
<head>
    <title>Face Authentication</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f6f8;
        }

        .auth-form {
            width: 400px;
            padding: 28px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { margin-bottom: 16px; }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            background: #f1f1f1;
            font-weight: bold;
            border: none;
        }

        .tab.active {
            background: #1976d2;
            color: white;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 16px;
        }

        .camera-wrapper {
            width: 220px;
            height: 280px;
            margin: 0 auto 16px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #1976d2;
            background: black;
        }

        video, img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas { display: none; }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .btn.secondary {
            background: #eeeeee;
            color: #333;
        }

        .msg {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .error { background: #ffe5e5; color: #b00020; }
        .success { background: #e6fffa; color: #00695c; }

        .hint {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<form class="auth-form" method="post" action="{{ base_url }}login" id="loginForm">

    <h2 id="title">Face Login</h2>

    <div id="msgBox" class="msg" style="display:none;"></div>

    <input type="hidden" name="_xsrf" value="{{ xsrf }}">
    <input type="hidden" name="face_image" id="face_image">

    <div class="tabs">
        <button type="button" class="tab active" onclick="switchMode('login')">Login</button>
        <button type="button" class="tab" onclick="switchMode('register')">Register</button>
    </div>

    <label>Username</label>
    <input type="text" id="username" name="username" required>

    <div class="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <img id="preview" style="display:none;">
    </div>

    <div class="hint" id="hint">Align your face and capture</div>

    <canvas id="canvas"></canvas>

    <button type="button" class="btn secondary" id="captureBtn" onclick="capture()">Capture Face</button>
    <button type="button" class="btn secondary" id="retakeBtn" onclick="retake()" style="display:none;">Retake</button>

    <!-- LOGIN -->
    <button type="submit" class="btn" id="loginBtn" style="display:none;">Sign In</button>

    <!-- REGISTER -->
    <button type="button" class="btn" id="registerBtn" style="display:none;" onclick="registerFace()">
        Register Face
    </button>

</form>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");
const faceInput = document.getElementById("face_image");
const msgBox = document.getElementById("msgBox");

const captureBtn = document.getElementById("captureBtn");
const retakeBtn = document.getElementById("retakeBtn");
const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const title = document.getElementById("title");
const hint = document.getElementById("hint");

let mode = "login";
let stream;

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}
startCamera();

function capture() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    const base64 = canvas.toDataURL("image/jpeg", 0.85);
    faceInput.value = base64.split(",")[1];

    preview.src = base64;
    preview.style.display = "block";
    video.style.display = "none";

    stream.getTracks().forEach(t => t.stop());

    captureBtn.style.display = "none";
    retakeBtn.style.display = "block";

    loginBtn.style.display = mode === "login" ? "block" : "none";
    registerBtn.style.display = mode === "register" ? "block" : "none";
}

function retake() {
    faceInput.value = "";
    preview.style.display = "none";
    video.style.display = "block";

    captureBtn.style.display = "block";
    retakeBtn.style.display = "none";
    loginBtn.style.display = "none";
    registerBtn.style.display = "none";

    startCamera();
}

function switchMode(m) {
    mode = m;
    title.innerText = m === "login" ? "Face Login" : "Face Registration";
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
    msgBox.style.display = "none";
    retake();
}

/* 🔥 FRONTEND-ONLY REGISTER */
async function registerFace() {
    const username = document.getElementById("username").value;
    const image = faceInput.value;

    if (!username || !image) {
        showMsg("Username and face image required", true);
        return;
    }

    showMsg("Registering face...", false);

    try {
        const res = await fetch("http://172.168.14.28:8502/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: username,
                image_data: image,
                app_name: "netra"
            })
        });

        const result = await res.json();

        if (res.ok && result.success) {
            showMsg("Face registered successfully. You can login now.", false, true);
            switchMode("login");
        } else {
            showMsg(result.message || "Registration failed", true);
        }

    } catch (e) {
        showMsg("Face registration service unavailable", true);
    }
}

function showMsg(msg, isError, success=false) {
    msgBox.innerText = msg;
    msgBox.className = "msg " + (isError ? "error" : success ? "success" : "");
    msgBox.style.display = "block";
}
</script>

</body>
</html>
