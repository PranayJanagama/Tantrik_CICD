{% extends "page.html" %}

{% block main %}

<style>
  body {
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    font-family: "Inter", "Segoe UI", sans-serif;
  }

  .error-box {
    max-width: 520px;
    margin: 90px auto;
    background: #ffffff;
    padding: 38px 42px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    text-align: center;
    animation: fadein 0.6s ease;
  }

  .error-box h1 {
    font-size: 42px;
    margin: 0;
    color: #ff4d4f;
    font-weight: 800;
  }

  .error-box h2 {
    font-size: 24px;
    color: #333;
    margin-top: 10px;
    font-weight: 600;
  }

  .error-box p {
    font-size: 16.5px;
    color: #555;
    margin: 14px 0;
    line-height: 1.55em;
  }

  .logout-btn {
    margin-top: 24px;
    display: inline-block;
    padding: 12px 30px;
    background-color: #f37626;
    color: #ffffff !important;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.25s ease;
  }

  .logout-btn:hover {
    background-color: #e7661c;
    transform: translateY(-2px);
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="error-box">
  <h2>Access Restricted</h2>

  <p>
    The user <strong>{{ user.name }}</strong> is not permitted to log in to
    <strong>Tantrik</strong> at this time.
  </p>

  <!-- <p>
    If you believe this is an error, please contact your instructor or system administrator.
  </p> -->

  <a href="{{ base_url }}logout" class="logout-btn">
    Return to Login
  </a>
</div>

{% endblock %}
